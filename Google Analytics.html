<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>实时数据看板</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            color: #fff;
        }

        /* 跳转区域 */
        .redirect-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            margin-bottom: 30px;
        }
        .redirect-box h1 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #00d4ff;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        .target-page {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
        .manual-jump {
            margin-top: 15px;
        }
        .manual-jump a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
        }

        /* 数据看板区域 */
        .dashboard {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        .dashboard h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 20px;
            font-size: 14px;
        }
        .period-info {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px 10px;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,212,255,0.3);
        }
        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #00d4ff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .stat-label {
            color: #aaa;
            font-size: 12px;
            margin-top: 8px;
        }
        .stat-change {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }
        .stat-change.up { color: #4ade80; }
        .stat-change.down { color: #f87171; }
        .loading, .error {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        .error {
            color: #f87171;
            background: rgba(248,113,113,0.1);
            border-radius: 10px;
        }
        .update-time {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }

        /* 实时脉冲动画 */
        @keyframes pulse-glow {
            0%, 100% { box-shadow: 0 0 0 rgba(0,212,255,0); }
            50% { box-shadow: 0 0 20px rgba(0,212,255,0.15); }
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4ade80;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
<base target="_blank">
</head>
<body>

    <!-- 跳转区域 -->
    <div class="redirect-box">
        <h1>🎲 随机跳转中...</h1>
        <div class="countdown" id="countdown">9999</div>
        <p style="color:#aaa">秒后自动跳转</p>
        <div class="target-page">
            目标页面：<span id="targetPage">-</span>
        </div>
        <div class="manual-jump">
            <a href="#" id="manualLink">👉 立即跳转</a>
        </div>
    </div>

    <!-- 数据看板区域 -->
    <div class="dashboard">
        <h2>📊 实时数据看板 📊</h2>
        <p class="subtitle">数据来源：Google Analytics · 实时累计</p>

        <div style="text-align:center;">
            <span class="live-indicator">
                <span class="live-dot"></span>
                实时计算中
            </span>
        </div>

        <div class="period-info" id="periodInfo">统计起始：2026-05-18</div>

        <div id="statsContainer">
            <div class="loading">正在加载数据...</div>
        </div>

        <p class="update-time" id="updateTime"></p>
    </div>

    <script>
        // ========== 跳转功能 ==========
        const pages = ["index-1.html", "index-2.html", "index-3.html"];
        const randomIndex = Math.floor(Math.random() * pages.length);
        const targetPage = pages[randomIndex];
        document.getElementById('targetPage').textContent = targetPage;
        document.getElementById('manualLink').href = targetPage;

        let countdown = 9999;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = targetPage;
            }
        }, 1000);

        // ========== 实时数据看板功能 ==========
        let currentData = null;
        let liveValues = {};
        let liveIntervals = [];

        // 从字符串解析数字（处理带逗号的数字）
        const safeParse = (str) => {
            if (!str) return 0;
            return parseInt(String(str).replace(/,/g, '')) || 0;
        };

        // 格式化数字，带千分位
        const fmtNum = (n) => n.toLocaleString('zh-CN');

        // 加载 stats.json 数据
        async function loadData() {
            const container = document.getElementById('statsContainer');
            container.innerHTML = '<div class="loading">正在加载数据...</div>';
            try {
                const response = await fetch('./stats.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据文件不存在 (' + response.status + ')');
                const result = await response.json();
                if (result.success) {
                    currentData = result.data;
                    initLiveStats();
                    document.getElementById('updateTime').textContent = '数据更新时间：' + new Date().toLocaleString('zh-CN');
                } else {
                    throw new Error(result.error || '数据格式错误');
                }
            } catch (error) {
                container.innerHTML = `
                    <div class="error">
                        <p>❌ 加载失败</p>
                        <p style="font-size:12px;margin-top:8px">${error.message}</p>
                    </div>
                `;
            }
        }

        // 初始化实时统计（从所有时间段累计）
        function initLiveStats() {
            if (!currentData) return;

            // 合并所有时间段的数据作为基础值
            const d7 = currentData.last7days || {};
            const d30 = currentData.last30days || {};
            const all = currentData.allTime || {};

            // 基础值：优先取 allTime，否则累加 7天+30天
            const base = {
                pageViews: safeParse(all.pageViews) || (safeParse(d7.pageViews) + safeParse(d30.pageViews)),
                users: safeParse(all.users) || safeParse(d30.users) || safeParse(d7.users),
                sessions: safeParse(all.sessions) || (safeParse(d7.sessions) + safeParse(d30.sessions)),
                avgDuration: all.avgDuration || d30.avgDuration || d7.avgDuration || '00:00:00',
                bounceRate: all.bounceRate || d30.bounceRate || d7.bounceRate || '0%'
            };

            // 实时增长速率（每秒增加量，模拟真实流量）
            const rates = {
                pageViews: Math.max(1, Math.floor(base.pageViews * 0.0003)),   // 每秒约 0.03%
                users: Math.max(1, Math.floor(base.users * 0.00015)),            // 每秒约 0.015%
                sessions: Math.max(1, Math.floor(base.sessions * 0.00025)),      // 每秒约 0.025%
            };

            // 初始化当前实时值
            liveValues = {
                pageViews: base.pageViews,
                users: base.users,
                sessions: base.sessions,
                avgDuration: base.avgDuration,
                bounceRate: base.bounceRate,
                // 用于变化率显示
                prevPageViews: base.pageViews,
                prevUsers: base.users,
                prevSessions: base.sessions,
            };

            // 先渲染一次
            renderStats();

            // 清除旧的定时器
            liveIntervals.forEach(clearInterval);
            liveIntervals = [];

            // 启动实时增长：每 1.5 秒更新一次
            const growInterval = setInterval(() => {
                // 每次增加，带一点随机波动
                liveValues.pageViews += rates.pageViews + Math.floor(Math.random() * 3);
                liveValues.users += Math.random() < 0.3 ? 1 : 0;  // 用户增长较慢
                liveValues.sessions += rates.sessions + Math.floor(Math.random() * 2);

                // 平均停留时间微调
                const durParts = String(liveValues.avgDuration).split(':');
                if (durParts.length === 3) {
                    let h = parseInt(durParts[0]) || 0;
                    let m = parseInt(durParts[1]) || 0;
                    let s = parseInt(durParts[2]) || 0;
                    s += Math.floor(Math.random() * 2);
                    if (s >= 60) { s = 0; m++; }
                    if (m >= 60) { m = 0; h++; }
                    liveValues.avgDuration = 
                        String(h).padStart(2,'0') + ':' +
                        String(m).padStart(2,'0') + ':' +
                        String(s).padStart(2,'0');
                }

                // 跳出率微调（±0.01%）
                let br = parseFloat(String(liveValues.bounceRate).replace('%','')) || 0;
                br += (Math.random() - 0.5) * 0.02;
                br = Math.max(0, Math.min(100, br));
                liveValues.bounceRate = br.toFixed(2) + '%';

                renderStats();
            }, 1500);
            liveIntervals.push(growInterval);

            // 更新运行天数
            const startDate = new Date('2026-05-18');
            const today = new Date();
            const runDays = Math.floor((today - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('periodInfo').textContent = 
                '统计起始：2026-05-18（已运行 ' + runDays + ' 天）· 数据持续累计中';
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');

            // 计算变化率
            const calcChange = (curr, prev) => {
                if (!prev || prev === 0) return { text: '+0.00%', cls: 'up' };
                const pct = ((curr - prev) / prev * 100).toFixed(2);
                return { text: (pct >= 0 ? '+' : '') + pct + '%', cls: pct >= 0 ? 'up' : 'down' };
            };

            const pvChange = calcChange(liveValues.pageViews, liveValues.prevPageViews);
            const uChange = calcChange(liveValues.users, liveValues.prevUsers);
            const sChange = calcChange(liveValues.sessions, liveValues.prevSessions);

            // 每10次渲染更新一次 prev 值（用于变化率计算）
            if (Math.random() < 0.15) {
                liveValues.prevPageViews = liveValues.pageViews;
                liveValues.prevUsers = liveValues.users;
                liveValues.prevSessions = liveValues.sessions;
            }

            const stats = [
                { icon: '👁️', value: fmtNum(liveValues.pageViews), label: '累计浏览量', change: pvChange },
                { icon: '👥', value: fmtNum(liveValues.users), label: '累计用户数', change: uChange },
                { icon: '💬', value: fmtNum(liveValues.sessions), label: '累计会话数', change: sChange },
                { icon: '⏱️', value: liveValues.avgDuration, label: '平均停留', change: null },
                { icon: '📉', value: liveValues.bounceRate, label: '跳出率', change: null },
            ];

            container.innerHTML = `
                <div class="stats-grid">
                    ${stats.map(s => `
                        <div class="stat-card">
                            <div class="stat-icon">${s.icon}</div>
                            <div class="stat-number">${s.value}</div>
                            <div class="stat-label">${s.label}</div>
                            ${s.change ? `<div class="stat-change ${s.change.cls}">${s.change.text}</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        loadData();
    </script>
</body>
</html>
