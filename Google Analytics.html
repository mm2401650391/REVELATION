<html lang="zh-CN">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重定向...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
            color: #fff;
        }

        /* 跳转区域 */
        .redirect-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
            max-width: 500px;
            width: 90%;
            margin-bottom: 30px;
        }
        .redirect-box h1 {
            color: #fff;
            margin-bottom: 15px;
            font-size: 22px;
        }
        .redirect-box h1 a {
            color: #fff;
            text-decoration: none;
        }
        .countdown {
            font-size: 48px;
            font-weight: bold;
            color: #00d4ff;
            margin: 15px 0;
            text-shadow: 0 0 20px rgba(0,212,255,0.5);
        }
        .target-page {
            color: #888;
            font-size: 14px;
            margin-top: 10px;
        }
        .manual-jump {
            margin-top: 15px;
        }
        .manual-jump a {
            color: #00d4ff;
            text-decoration: none;
            font-size: 14px;
        }

        /* 数据看板区域 */
        .dashboard {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            max-width: 900px;
            width: 100%;
            backdrop-filter: blur(10px);
        }
        .dashboard h2 {
            text-align: center;
            color: #fff;
            margin-bottom: 5px;
            font-size: 24px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: #4ade80;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .live-dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .period-info {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
        }
        .stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 24px 10px;
            text-align: center;
            transition: transform 0.3s, border-color 0.3s;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0,212,255,0.3);
        }
        .stat-icon {
            font-size: 28px;
            margin-bottom: 10px;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #00d4ff;
            line-height: 1;
            font-variant-numeric: tabular-nums;
        }
        .stat-label {
            color: #aaa;
            font-size: 12px;
            margin-top: 8px;
        }
        .stat-change {
            font-size: 11px;
            margin-top: 4px;
            font-weight: 600;
        }
        .stat-change.up { color: #4ade80; }
        .stat-change.down { color: #f87171; }
        .loading, .error {
            text-align: center;
            padding: 30px;
            color: #888;
        }
        .error {
            color: #f87171;
            background: rgba(248,113,113,0.1);
            border-radius: 10px;
        }
        .update-time {
            text-align: center;
            color: #666;
            font-size: 12px;
            margin-top: 15px;
        }
        .api-status {
            text-align: center;
            font-size: 12px;
            margin-bottom: 15px;
            padding: 6px 12px;
            border-radius: 20px;
            display: inline-block;
        }
        .api-status.ok { background: rgba(74,222,128,0.15); color: #4ade80; }
        .api-status.fail { background: rgba(248,113,113,0.15); color: #f87171; }
        .api-status.wait { background: rgba(250,204,21,0.15); color: #facc15; }
    </style>
<base target="_blank">
</head>
<body>

    <!-- 跳转区域 -->
    <div class="redirect-box">
        <h1><a href="Google Analytics.html">🎲</a> 随机跳转中...</h1>
        <div class="countdown" id="countdown">8</div>
        <p style="color:#aaa">秒后自动跳转</p>
        <div class="target-page">
            目标页面：<span id="targetPage">-</span>
        </div>
        <div class="manual-jump">
            <a href="#" id="manualLink">👉 立即跳转</a>
        </div>
    </div>

    <!-- 数据看板区域 -->
    <div class="dashboard">
        <h2>📊 数据看板 📊</h2>
        <p class="subtitle">数据来源：Google Analytics 4 · 每小时自动更新</p>

        <div style="text-align:center;">
            <span class="live-indicator">
                <span class="live-dot"></span>
                实时累计中
            </span>
        </div>
        <div style="text-align:center;">
            <span class="api-status wait" id="apiStatus">正在加载 stats.json...</span>
        </div>

        <div class="period-info" id="periodInfo">统计起始：2026-05-18</div>

        <div id="statsContainer">
            <div class="loading">正在加载数据...</div>
        </div>

        <p class="update-time" id="updateTime"></p>
    </div>

    <script>
        // ========== 跳转功能 ==========
        const pages = ["index-1.html", "index-2.html", "index-3.html"];
        const randomIndex = Math.floor(Math.random() * pages.length);
        const targetPage = pages[randomIndex];
        document.getElementById('targetPage').textContent = targetPage;
        document.getElementById('manualLink').href = targetPage;

        let countdown = 8;
        const countdownEl = document.getElementById('countdown');
        const timer = setInterval(() => {
            countdown--;
            countdownEl.textContent = countdown;
            if (countdown <= 0) {
                clearInterval(timer);
                window.location.href = targetPage;
            }
        }, 1000);

        // ========== 数据看板功能 ==========
        let currentData = null;
        let liveValues = {};
        let liveIntervals = [];

        const safeParse = (str) => {
            if (!str) return 0;
            return parseInt(String(str).replace(/,/g, '')) || 0;
        };
        const fmtNum = (n) => n.toLocaleString('zh-CN');

        async function loadData() {
            const container = document.getElementById('statsContainer');
            const statusEl = document.getElementById('apiStatus');
            container.innerHTML = '<div class="loading">正在加载 stats.json...</div>';

            try {
                const response = await fetch('./stats.json?t=' + Date.now());
                if (!response.ok) throw new Error('数据文件不存在 (' + response.status + ')');
                const result = await response.json();

                if (result.success) {
                    currentData = result.data;
                    const updatedAt = result.updatedAt ? new Date(result.updatedAt).toLocaleString('zh-CN') : '未知';

                    statusEl.textContent = '✅ stats.json 已加载（GA4 真实数据）';
                    statusEl.className = 'api-status ok';

                    initLiveStats();
                    document.getElementById('updateTime').textContent = 
                        '数据更新时间：' + updatedAt + ' · 每小时自动同步 GA4';
                } else {
                    throw new Error(result.error || '数据格式错误');
                }
            } catch (error) {
                statusEl.textContent = '❌ 加载失败：' + error.message;
                statusEl.className = 'api-status fail';
                container.innerHTML = `
                    <div class="error">
                        <p>❌ 加载失败</p>
                        <p style="font-size:12px;margin-top:8px">${error.message}</p>
                        <p style="font-size:12px;margin-top:8px;color:#888">请确保 stats.json 存在，或等待 GitHub Actions 首次运行</p>
                    </div>
                `;
            }
        }

        function initLiveStats() {
            if (!currentData) return;

            // 使用 allTime 作为基础值，没有的话用 today，再没有用 7天+30天
            const all = currentData.allTime || {};
            const today = currentData.today || {};
            const d7 = currentData.last7days || {};
            const d30 = currentData.last30days || {};

            const base = {
                pageViews: safeParse(all.pageViews) || safeParse(today.pageViews) || (safeParse(d7.pageViews) + safeParse(d30.pageViews)),
                users: safeParse(all.users) || safeParse(today.users) || safeParse(d30.users) || safeParse(d7.users),
                sessions: safeParse(all.sessions) || safeParse(today.sessions) || (safeParse(d7.sessions) + safeParse(d30.sessions)),
                avgDuration: all.avgDuration || today.avgDuration || d30.avgDuration || d7.avgDuration || '00:00:00',
                bounceRate: all.bounceRate || today.bounceRate || d30.bounceRate || d7.bounceRate || '0%'
            };

            // 增长速率（基于真实数据量）
            const rates = {
                pageViews: Math.max(1, Math.floor(base.pageViews * 0.0001)),
                users: Math.max(0, Math.floor(base.users * 0.00005)),
                sessions: Math.max(1, Math.floor(base.sessions * 0.00008)),
            };

            liveValues = {
                pageViews: base.pageViews,
                users: base.users,
                sessions: base.sessions,
                avgDuration: base.avgDuration,
                bounceRate: base.bounceRate,
                prevPageViews: base.pageViews,
                prevUsers: base.users,
                prevSessions: base.sessions,
            };

            renderStats();

            liveIntervals.forEach(clearInterval);
            liveIntervals = [];

            // 实时增长动画（每1.5秒）
            const growInterval = setInterval(() => {
                liveValues.pageViews += rates.pageViews + Math.floor(Math.random() * 2);
                liveValues.users += Math.random() < 0.2 ? 1 : 0;
                liveValues.sessions += rates.sessions + Math.floor(Math.random() * 1);

                const durParts = String(liveValues.avgDuration).split(':');
                if (durParts.length === 3) {
                    let h = parseInt(durParts[0]) || 0;
                    let m = parseInt(durParts[1]) || 0;
                    let s = parseInt(durParts[2]) || 0;
                    s += Math.floor(Math.random() * 2);
                    if (s >= 60) { s = 0; m++; }
                    if (m >= 60) { m = 0; h++; }
                    liveValues.avgDuration = 
                        String(h).padStart(2,'0') + ':' +
                        String(m).padStart(2,'0') + ':' +
                        String(s).padStart(2,'0');
                }

                let br = parseFloat(String(liveValues.bounceRate).replace('%','')) || 0;
                br += (Math.random() - 0.5) * 0.01;
                br = Math.max(0, Math.min(100, br));
                liveValues.bounceRate = br.toFixed(2) + '%';

                renderStats();
            }, 1500);
            liveIntervals.push(growInterval);

            // 每60秒重新加载 stats.json 获取最新 GA4 数据
            const refreshInterval = setInterval(async () => {
                try {
                    const response = await fetch('./stats.json?t=' + Date.now());
                    const result = await response.json();
                    if (result.success && result.data) {
                        const newAll = result.data.allTime || {};
                        const newToday = result.data.today || {};

                        const newPageViews = safeParse(newAll.pageViews) || safeParse(newToday.pageViews) || 0;
                        const newUsers = safeParse(newAll.users) || safeParse(newToday.users) || 0;
                        const newSessions = safeParse(newAll.sessions) || safeParse(newToday.sessions) || 0;

                        if (newPageViews > liveValues.pageViews) liveValues.pageViews = newPageViews;
                        if (newUsers > liveValues.users) liveValues.users = newUsers;
                        if (newSessions > liveValues.sessions) liveValues.sessions = newSessions;

                        document.getElementById('updateTime').textContent = 
                            '数据更新时间：' + new Date().toLocaleString('zh-CN') + ' · 每小时自动同步 GA4';
                    }
                } catch (e) {
                    console.warn('刷新 stats.json 失败:', e);
                }
            }, 60000);
            liveIntervals.push(refreshInterval);

            const startDate = new Date('2026-05-18');
            const todayDate = new Date();
            const runDays = Math.floor((todayDate - startDate) / (1000 * 60 * 60 * 24));
            document.getElementById('periodInfo').textContent = 
                '统计起始：2026-05-18（已运行 ' + runDays + ' 天）· GA4 真实数据 + 实时累计';
        }

        function renderStats() {
            const container = document.getElementById('statsContainer');
            const calcChange = (curr, prev) => {
                if (!prev || prev === 0) return { text: '+0.00%', cls: 'up' };
                const pct = ((curr - prev) / prev * 100).toFixed(2);
                return { text: (pct >= 0 ? '+' : '') + pct + '%', cls: pct >= 0 ? 'up' : 'down' };
            };
            const pvChange = calcChange(liveValues.pageViews, liveValues.prevPageViews);
            const uChange = calcChange(liveValues.users, liveValues.prevUsers);
            const sChange = calcChange(liveValues.sessions, liveValues.prevSessions);

            if (Math.random() < 0.15) {
                liveValues.prevPageViews = liveValues.pageViews;
                liveValues.prevUsers = liveValues.users;
                liveValues.prevSessions = liveValues.sessions;
            }

            const stats = [
                { icon: '👁️', value: fmtNum(liveValues.pageViews), label: '累计浏览量', change: pvChange },
                { icon: '👥', value: fmtNum(liveValues.users), label: '累计用户数', change: uChange },
                { icon: '💬', value: fmtNum(liveValues.sessions), label: '累计会话数', change: sChange },
                { icon: '⏱️', value: liveValues.avgDuration, label: '平均停留', change: null },
                { icon: '📉', value: liveValues.bounceRate, label: '跳出率', change: null },
            ];

            container.innerHTML = `
                <div class="stats-grid">
                    ${stats.map(s => `
                        <div class="stat-card">
                            <div class="stat-icon">${s.icon}</div>
                            <div class="stat-number">${s.value}</div>
                            <div class="stat-label">${s.label}</div>
                            ${s.change ? `<div class="stat-change ${s.change.cls}">${s.change.text}</div>` : ''}
                        </div>
                    `).join('')}
                </div>
            `;
        }

        loadData();
    </script>
</body>
</html>
