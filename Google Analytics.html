<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GA4 完整数据查看</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 28px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
        }
        .card h2 {
            color: #667eea;
            margin-bottom: 16px;
            font-size: 20px;
            border-bottom: 2px solid #e4e8ec;
            padding-bottom: 10px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #e4e8ec;
        }
        th {
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ec 100%);
            font-weight: 600;
            color: #667eea;
        }
        td {
            color: #555;
        }
        tr:hover td {
            background: #f8f9fa;
        }
        .json-view {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }
        .error {
            background: #fee2e2;
            color: #991b1b;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .update-time {
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
            margin-top: 20px;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-green { background: #dcfce7; color: #166534; }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-purple { background: #f3e8ff; color: #6b21a8; }
        .badge-orange { background: #ffedd5; color: #9a3412; }
    </style>
<base target="_blank">
</head>
<body>

<div class="container">
    <h1>📊 GA4 完整数据查看</h1>

    <div id="content">
        <div class="loading">正在加载 stats.json...</div>
    </div>

    <p class="update-time" id="updateTime"></p>
</div>

<script>
    async function loadData() {
        const container = document.getElementById('content');

        try {
            const response = await fetch('./stats.json?t=' + Date.now());
            if (!response.ok) throw new Error('数据文件不存在 (' + response.status + ')');
            const result = await response.json();

            if (result.success) {
                const updatedAt = result.updatedAt ? new Date(result.updatedAt).toLocaleString('zh-CN') : '未知';
                document.getElementById('updateTime').textContent = '数据更新时间：' + updatedAt;
                renderAllData(result.data);
            } else {
                throw new Error(result.error || '数据格式错误');
            }
        } catch (error) {
            container.innerHTML = '<div class="error">❌ 加载失败：' + error.message + '</div>';
        }
    }

    function renderAllData(data) {
        const container = document.getElementById('content');

        const periods = [
            { key: 'today', label: '今日数据', badge: 'badge-orange' },
            { key: 'allTime', label: '全部历史（累计）', badge: 'badge-green' },
            { key: 'last7days', label: '最近 7 天', badge: 'badge-blue' },
            { key: 'last30days', label: '最近 30 天', badge: 'badge-purple' }
        ];

        let html = '';

        periods.forEach(period => {
            const d = data[period.key] || {};
            if (Object.keys(d).length === 0) return;

            html += '<div class="card">' +
                '<h2><span class="badge ' + period.badge + '">' + period.label + '</span></h2>' +
                '<table>' +
                '<tr><th>指标</th><th>数值</th></tr>' +
                '<tr><td>👁️ 浏览量（pageViews）</td><td><strong>' + (d.pageViews || '-') + '</strong></td></tr>' +
                '<tr><td>👥 用户数（users）</td><td><strong>' + (d.users || '-') + '</strong></td></tr>' +
                '<tr><td>🆕 新用户数（newUsers）</td><td><strong>' + (d.newUsers || '-') + '</strong></td></tr>' +
                '<tr><td>💬 会话数（sessions）</td><td><strong>' + (d.sessions || '-') + '</strong></td></tr>' +
                '<tr><td>⏱️ 平均停留（avgDuration）</td><td><strong>' + (d.avgDuration || '-') + '</strong></td></tr>' +
                '<tr><td>📉 跳出率（bounceRate）</td><td><strong>' + (d.bounceRate || '-') + '</strong></td></tr>' +
                '</table></div>';
        });

        html += '<div class="card"><h2>🔧 原始 JSON 数据</h2>' +
            '<pre class="json-view">' + JSON.stringify(data, null, 2) + '</pre></div>';

        container.innerHTML = html;
    }

    loadData();
</script>

</body>
</html>
