<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 GA4 数据仪表盘</title>
    <style>
        /* ========== 基础样式 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            padding: 20px;
            color: #e0e0e0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* ========== 头部 ========== */
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 30px 0;
        }

        header h1 {
            font-size: 36px;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            text-shadow: none;
        }

        header p {
            color: #888;
            font-size: 14px;
        }

        .update-time {
            text-align: center;
            color: #667eea;
            font-size: 13px;
            margin-top: 10px;
            opacity: 0.8;
        }

        /* ========== 卡片通用样式 ========== */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(102, 126, 234, 0.15);
        }

        .card h2 {
            color: #fff;
            margin-bottom: 20px;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card h2 .icon {
            font-size: 22px;
        }

        /* ========== 指标卡片网格 ========== */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .metric-card {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.2), rgba(118, 75, 162, 0.2));
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            border: 1px solid rgba(102, 126, 234, 0.3);
            transition: all 0.3s ease;
        }

        .metric-card:hover {
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.3), rgba(118, 75, 162, 0.3));
            transform: scale(1.02);
        }

        .metric-card .value {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin: 10px 0;
            text-shadow: 0 0 20px rgba(102, 126, 234, 0.5);
        }

        .metric-card .label {
            font-size: 13px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-card .change {
            font-size: 12px;
            margin-top: 8px;
            padding: 4px 10px;
            border-radius: 20px;
            display: inline-block;
        }

        .change.up {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
        }

        .change.down {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }

        /* ========== 表格样式 ========== */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            background: rgba(102, 126, 234, 0.15);
            color: #667eea;
            font-weight: 600;
            padding: 14px 16px;
            text-align: left;
            border-bottom: 2px solid rgba(102, 126, 234, 0.3);
        }

        td {
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: #ccc;
        }

        tr:hover td {
            background: rgba(102, 126, 234, 0.05);
        }

        /* ========== 进度条 ========== */
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 1s ease;
        }

        /* ========== 两栏布局 ========== */
        .two-col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 24px;
        }

        /* ========== 饼图/环形图容器 ========== */
        .chart-container {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: center;
            align-items: center;
            padding: 20px 0;
        }

        .pie-chart {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
        }

        .pie-chart::before {
            content: '';
            position: absolute;
            width: 100px;
            height: 100px;
            background: #1a1a2e;
            border-radius: 50%;
        }

        .pie-chart span {
            position: relative;
            z-index: 1;
        }

        .pie-legend {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .legend-color {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        /* ========== 实时在线 ========== */
        .live-indicator {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
        }

        .live-dot {
            width: 10px;
            height: 10px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
        }

        /* ========== 标签 ========== */
        .tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .tag-green { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .tag-blue { background: rgba(59, 130, 246, 0.2); color: #60a5fa; }
        .tag-purple { background: rgba(168, 85, 247, 0.2); color: #c084fc; }
        .tag-orange { background: rgba(249, 115, 22, 0.2); color: #fb923c; }
        .tag-red { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        /* ========== JSON 查看器 ========== */
        .json-view {
            background: #0d0d0d;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 12px;
            overflow-x: auto;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .json-key { color: #9cdcfe; }
        .json-string { color: #ce9178; }
        .json-number { color: #b5cea8; }
        .json-boolean { color: #569cd6; }
        .json-null { color: #569cd6; }

        /* ========== 加载/错误状态 ========== */
        .loading {
            text-align: center;
            padding: 60px;
            color: #667eea;
            font-size: 18px;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #667eea;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 10px;
            animation: spin 1s linear infinite;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 24px;
            border-radius: 16px;
            text-align: center;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .metrics-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .two-col {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 24px;
            }
        }

        /* ========== 来源图标 ========== */
        .source-icon {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 10px;
            font-size: 14px;
        }

        /* ========== 国家旗帜占位 ========== */
        .flag {
            width: 24px;
            height: 18px;
            border-radius: 4px;
            display: inline-block;
            margin-right: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            text-align: center;
            line-height: 18px;
            font-size: 12px;
        }
    </style>
<base target="_blank">
</head>
<body>

<div class="container">
    <header>
        <h1>📊 GA4 数据仪表盘</h1>
        <p>实时监控网站流量与用户行为</p>
        <p class="update-time" id="updateTime">正在加载...</p>
    </header>

    <div id="content">
        <div class="loading">正在加载 stats.json</div>
    </div>
</div>

<script>
    // ========== 颜色配置 ==========
    const COLORS = [
        '#667eea', '#764ba2', '#f093fb', '#f5576c',
        '#4ade80', '#60a5fa', '#fbbf24', '#a78bfa',
        '#34d399', '#f472b6', '#fb923c', '#22d3ee'
    ];

    // ========== 加载数据 ==========
    async function loadData() {
        const container = document.getElementById('content');

        try {
            const response = await fetch('./stats.json?t=' + Date.now());
            if (!response.ok) throw new Error('数据文件不存在 (' + response.status + ')');
            const result = await response.json();

            if (result.success) {
                const updatedAt = result.updatedAt 
                    ? new Date(result.updatedAt).toLocaleString('zh-CN') 
                    : '未知';
                document.getElementById('updateTime').textContent = '数据更新时间：' + updatedAt;
                renderDashboard(result.data);
            } else {
                throw new Error(result.error || '数据格式错误');
            }
        } catch (error) {
            container.innerHTML = '<div class="error">❌ 加载失败：' + error.message + '</div>';
        }
    }

    // ========== 渲染整个仪表盘 ==========
    function renderDashboard(data) {
        const container = document.getElementById('content');
        let html = '';

        // 1. 核心指标卡片
        html += renderMetricsCards(data);

        // 2. 实时在线
        if (data.realtime) {
            html += renderRealtime(data.realtime);
        }

        // 3. 流量来源 + 设备类型
        html += '<div class="two-col">';
        if (data.trafficSources) {
            html += renderTrafficSources(data.trafficSources);
        }
        if (data.devices) {
            html += renderDevices(data.devices);
        }
        html += '</div>';

        // 4. 地理位置
        if (data.countries || data.cities) {
            html += renderLocations(data);
        }

        // 5. 热门页面
        if (data.topPages) {
            html += renderTopPages(data.topPages);
        }

        // 6. 浏览器 + 操作系统
        html += '<div class="two-col">';
        if (data.browsers) {
            html += renderBrowsers(data.browsers);
        }
        if (data.operatingSystems) {
            html += renderOS(data.operatingSystems);
        }
        html += '</div>';

        // 7. 事件数据
        if (data.events) {
            html += renderEvents(data.events);
        }

        // 8. 各时间段对比
        html += renderPeriodsComparison(data);

        // 9. 原始 JSON
        html += '<div class="card">' +
            '<h2><span class="icon">🔧</span> 原始 JSON 数据</h2>' +
            '<pre class="json-view">' + syntaxHighlight(JSON.stringify(data, null, 2)) + '</pre>' +
            '</div>';

        container.innerHTML = html;

        // 动画效果
        animateNumbers();
        animateProgressBars();
    }

    // ========== 1. 核心指标卡片 ==========
    function renderMetricsCards(data) {
        const periods = [
            { key: 'today', label: '今日', icon: '📅' },
            { key: 'yesterday', label: '昨日', icon: '⏪' },
            { key: 'last7days', label: '近7天', icon: '📈' },
            { key: 'last30days', label: '近30天', icon: '📊' },
            { key: 'allTime', label: '全部', icon: '🌍' }
        ];

        let html = '<div class="metrics-grid">';

        periods.forEach(period => {
            const d = data[period.key];
            if (!d) return;

            const change = d.changePercent || 0;
            const changeClass = change >= 0 ? 'up' : 'down';
            const changeIcon = change >= 0 ? '↑' : '↓';

            html += '<div class="metric-card">' +
                '<div class="label">' + period.icon + ' ' + period.label + '</div>' +
                '<div class="value" data-target="' + (d.users || 0) + '">0</div>' +
                '<div class="label">用户数</div>' +
                '<div class="change ' + changeClass + '">' + changeIcon + ' ' + Math.abs(change) + '%</div>' +
                '</div>';
        });

        html += '</div>';
        return html;
    }

    // ========== 2. 实时在线 ==========
    function renderRealtime(realtime) {
        return '<div class="card">' +
            '<h2><span class="icon">🔴</span> 实时在线</h2>' +
            '<div style="display:flex;align-items:center;gap:30px;flex-wrap:wrap;">' +
            '<div class="live-indicator">' +
            '<div class="live-dot"></div>' +
            '当前在线 ' + (realtime.activeUsers || 0) + ' 人' +
            '</div>' +
            '<div style="color:#888;font-size:14px;">' +
            '页面浏览: <strong style="color:#fff;">' + (realtime.pageViews || 0) + '</strong> / 分钟' +
            '</div>' +
            '<div style="color:#888;font-size:14px;">' +
            '热门页面: <strong style="color:#fff;">' + (realtime.topPage || '-') + '</strong>' +
            '</div>' +
            '</div>' +
            '</div>';
    }

    // ========== 3. 流量来源 ==========
    function renderTrafficSources(sources) {
        const total = sources.reduce((sum, s) => sum + (s.value || 0), 0);
        const sourceIcons = {
            'organic': '🔍', 'direct': '🔗', 'referral': '🌐',
            'social': '💬', 'email': '📧', 'paid': '💰', 'other': '📌'
        };

        let html = '<div class="card">' +
            '<h2><span class="icon">🚀</span> 流量来源</h2>' +
            '<table>' +
            '<tr><th>来源</th><th>用户数</th><th>占比</th><th>趋势</th></tr>';

        sources.forEach((source, i) => {
            const percent = total > 0 ? ((source.value / total) * 100).toFixed(1) : 0;
            const icon = sourceIcons[source.name?.toLowerCase()] || '📌';
            const color = COLORS[i % COLORS.length];

            html += '<tr>' +
                '<td><span style="color:' + color + '">' + icon + '</span> ' + (source.name || '未知') + '</td>' +
                '<td><strong>' + (source.value || 0).toLocaleString() + '</strong></td>' +
                '<td>' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                '<span style="min-width:45px;">' + percent + '%</span>' +
                '<div class="progress-bar" style="flex:1;">' +
                '<div class="progress-fill" style="width:0%;background:' + color + '" data-width="' + percent + '%"></div>' +
                '</div>' +
                '</div>' +
                '</td>' +
                '<td><span class="tag ' + (source.trend > 0 ? 'tag-green' : 'tag-red') + '">' + 
                (source.trend > 0 ? '↑' : '↓') + ' ' + Math.abs(source.trend || 0) + '%</span></td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 4. 设备类型 ==========
    function renderDevices(devices) {
        const total = devices.reduce((sum, d) => sum + (d.value || 0), 0);
        const deviceIcons = { 'desktop': '💻', 'mobile': '📱', 'tablet': '📋' };

        let html = '<div class="card">' +
            '<h2><span class="icon">📱</span> 设备类型</h2>' +
            '<div class="chart-container">';

        // 环形图
        let conicGradient = [];
        let currentDeg = 0;
        devices.forEach((device, i) => {
            const percent = total > 0 ? (device.value / total) * 100 : 0;
            const deg = (percent / 100) * 360;
            conicGradient.push(COLORS[i % COLORS.length] + ' ' + currentDeg + 'deg ' + (currentDeg + deg) + 'deg');
            currentDeg += deg;
        });

        html += '<div class="pie-chart" style="background: conic-gradient(' + conicGradient.join(', ') + ');">' +
            '<span>' + total.toLocaleString() + '</span>' +
            '</div>';

        // 图例
        html += '<div class="pie-legend">';
        devices.forEach((device, i) => {
            const percent = total > 0 ? ((device.value / total) * 100).toFixed(1) : 0;
            const icon = deviceIcons[device.name?.toLowerCase()] || '📱';
            html += '<div class="legend-item">' +
                '<div class="legend-color" style="background:' + COLORS[i % COLORS.length] + '"></div>' +
                '<span>' + icon + ' ' + (device.name || '未知') + ' <strong>' + percent + '%</strong> (' + (device.value || 0).toLocaleString() + ')</span>' +
                '</div>';
        });
        html += '</div></div></div>';

        return html;
    }

    // ========== 5. 地理位置 ==========
    function renderLocations(data) {
        let html = '<div class="two-col">';

        // 国家
        if (data.countries) {
            html += '<div class="card">' +
                '<h2><span class="icon">🌍</span> 国家/地区 TOP10</h2>' +
                '<table>' +
                '<tr><th>国家</th><th>用户数</th><th>占比</th></tr>';

            const total = data.countries.reduce((sum, c) => sum + (c.value || 0), 0);
            data.countries.slice(0, 10).forEach((country, i) => {
                const percent = total > 0 ? ((country.value / total) * 100).toFixed(1) : 0;
                html += '<tr>' +
                    '<td><span class="flag">' + (country.code || '') + '</span>' + (country.name || '未知') + '</td>' +
                    '<td><strong>' + (country.value || 0).toLocaleString() + '</strong></td>' +
                    '<td>' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" style="width:0%" data-width="' + percent + '%"></div>' +
                    '</div>' +
                    '</td>' +
                    '</tr>';
            });
            html += '</table></div>';
        }

        // 城市
        if (data.cities) {
            html += '<div class="card">' +
                '<h2><span class="icon">🏙️</span> 城市 TOP10</h2>' +
                '<table>' +
                '<tr><th>城市</th><th>用户数</th><th>占比</th></tr>';

            const total = data.cities.reduce((sum, c) => sum + (c.value || 0), 0);
            data.cities.slice(0, 10).forEach((city, i) => {
                const percent = total > 0 ? ((city.value / total) * 100).toFixed(1) : 0;
                html += '<tr>' +
                    '<td>📍 ' + (city.name || '未知') + '</td>' +
                    '<td><strong>' + (city.value || 0).toLocaleString() + '</strong></td>' +
                    '<td>' +
                    '<div class="progress-bar">' +
                    '<div class="progress-fill" style="width:0%" data-width="' + percent + '%"></div>' +
                    '</div>' +
                    '</td>' +
                    '</tr>';
            });
            html += '</table></div>';
        }

        html += '</div>';
        return html;
    }

    // ========== 6. 热门页面 ==========
    function renderTopPages(pages) {
        const total = pages.reduce((sum, p) => sum + (p.views || 0), 0);

        let html = '<div class="card">' +
            '<h2><span class="icon">🔥</span> 热门页面 TOP10</h2>' +
            '<table>' +
            '<tr><th>页面</th><th>浏览量</th><th>用户数</th><th>平均停留</th><th>跳出率</th></tr>';

        pages.slice(0, 10).forEach((page, i) => {
            const percent = total > 0 ? ((page.views / total) * 100).toFixed(1) : 0;
            const path = page.path || '/';
            const shortPath = path.length > 40 ? path.substring(0, 40) + '...' : path;

            html += '<tr>' +
                '<td><span class="tag tag-blue">' + (i + 1) + '</span> <span title="' + path + '">' + shortPath + '</span></td>' +
                '<td><strong>' + (page.views || 0).toLocaleString() + '</strong></td>' +
                '<td>' + (page.users || 0).toLocaleString() + '</td>' +
                '<td>' + (page.avgDuration || '-') + '</td>' +
                '<td>' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                '<span style="min-width:40px;">' + (page.bounceRate || '-') + '</span>' +
                '<div class="progress-bar" style="width:80px;">' +
                '<div class="progress-fill" style="width:0%;background:' + (parseFloat(page.bounceRate) > 50 ? '#f87171' : '#4ade80') + '" data-width="' + (page.bounceRate || '0%') + '"></div>' +
                '</div>' +
                '</div>' +
                '</td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 7. 浏览器 ==========
    function renderBrowsers(browsers) {
        const total = browsers.reduce((sum, b) => sum + (b.value || 0), 0);
        const browserIcons = {
            'chrome': '🌐', 'safari': '🧭', 'firefox': '🦊',
            'edge': '🌊', 'opera': '🔴', 'samsung': '📱'
        };

        let html = '<div class="card">' +
            '<h2><span class="icon">🌐</span> 浏览器分布</h2>' +
            '<table>' +
            '<tr><th>浏览器</th><th>用户数</th><th>占比</th></tr>';

        browsers.forEach((browser, i) => {
            const percent = total > 0 ? ((browser.value / total) * 100).toFixed(1) : 0;
            const icon = browserIcons[browser.name?.toLowerCase()] || '🌐';
            html += '<tr>' +
                '<td>' + icon + ' ' + (browser.name || '未知') + '</td>' +
                '<td><strong>' + (browser.value || 0).toLocaleString() + '</strong></td>' +
                '<td>' +
                '<div class="progress-bar">' +
                '<div class="progress-fill" style="width:0%" data-width="' + percent + '%"></div>' +
                '</div>' +
                '</td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 8. 操作系统 ==========
    function renderOS(systems) {
        const total = systems.reduce((sum, s) => sum + (s.value || 0), 0);
        const osIcons = {
            'windows': '🪟', 'macos': '🍎', 'ios': '📱',
            'android': '🤖', 'linux': '🐧', 'chrome os': '💻'
        };

        let html = '<div class="card">' +
            '<h2><span class="icon">💻</span> 操作系统</h2>' +
            '<table>' +
            '<tr><th>系统</th><th>用户数</th><th>占比</th></tr>';

        systems.forEach((os, i) => {
            const percent = total > 0 ? ((os.value / total) * 100).toFixed(1) : 0;
            const icon = osIcons[os.name?.toLowerCase()] || '💻';
            html += '<tr>' +
                '<td>' + icon + ' ' + (os.name || '未知') + '</td>' +
                '<td><strong>' + (os.value || 0).toLocaleString() + '</strong></td>' +
                '<td>' +
                '<div class="progress-bar">' +
                '<div class="progress-fill" style="width:0%" data-width="' + percent + '%"></div>' +
                '</div>' +
                '</td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 9. 事件数据 ==========
    function renderEvents(events) {
        const total = events.reduce((sum, e) => sum + (e.count || 0), 0);

        let html = '<div class="card">' +
            '<h2><span class="icon">⚡</span> 热门事件</h2>' +
            '<table>' +
            '<tr><th>事件名称</th><th>触发次数</th><th>用户数</th><th>占比</th></tr>';

        events.forEach((event, i) => {
            const percent = total > 0 ? ((event.count / total) * 100).toFixed(1) : 0;
            html += '<tr>' +
                '<td><span class="tag tag-purple">' + (event.category || 'event') + '</span> ' + (event.name || '未知') + '</td>' +
                '<td><strong>' + (event.count || 0).toLocaleString() + '</strong></td>' +
                '<td>' + (event.users || 0).toLocaleString() + '</td>' +
                '<td>' +
                '<div style="display:flex;align-items:center;gap:10px;">' +
                '<span style="min-width:45px;">' + percent + '%</span>' +
                '<div class="progress-bar" style="flex:1;">' +
                '<div class="progress-fill" style="width:0%" data-width="' + percent + '%"></div>' +
                '</div>' +
                '</div>' +
                '</td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 10. 各时间段对比 ==========
    function renderPeriodsComparison(data) {
        const periods = [
            { key: 'today', label: '今日', tag: 'tag-orange' },
            { key: 'yesterday', label: '昨日', tag: 'tag-blue' },
            { key: 'last7days', label: '近7天', tag: 'tag-purple' },
            { key: 'last30days', label: '近30天', tag: 'tag-green' },
            { key: 'allTime', label: '全部历史', tag: 'tag-red' }
        ];

        let html = '<div class="card">' +
            '<h2><span class="icon">📊</span> 各时间段数据对比</h2>' +
            '<table>' +
            '<tr>' +
            '<th>时间段</th>' +
            '<th>👁️ 浏览量</th>' +
            '<th>👥 用户数</th>' +
            '<th>🆕 新用户</th>' +
            '<th>💬 会话数</th>' +
            '<th>⏱️ 平均停留</th>' +
            '<th>📉 跳出率</th>' +
            '</tr>';

        periods.forEach(period => {
            const d = data[period.key];
            if (!d) return;

            html += '<tr>' +
                '<td><span class="tag ' + period.tag + '">' + period.label + '</span></td>' +
                '<td><strong>' + (d.pageViews || '-').toLocaleString() + '</strong></td>' +
                '<td><strong>' + (d.users || '-').toLocaleString() + '</strong></td>' +
                '<td>' + (d.newUsers || '-').toLocaleString() + '</td>' +
                '<td>' + (d.sessions || '-').toLocaleString() + '</td>' +
                '<td>' + (d.avgDuration || '-') + '</td>' +
                '<td>' + (d.bounceRate || '-') + '</td>' +
                '</tr>';
        });

        html += '</table></div>';
        return html;
    }

    // ========== 数字动画 ==========
    function animateNumbers() {
        document.querySelectorAll('.metric-card .value[data-target]').forEach(el => {
            const target = parseInt(el.getAttribute('data-target')) || 0;
            const duration = 1500;
            const start = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - start;
                const progress = Math.min(elapsed / duration, 1);
                const easeOut = 1 - Math.pow(1 - progress, 3);
                const current = Math.floor(easeOut * target);
                el.textContent = current.toLocaleString();

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }

            requestAnimationFrame(update);
        });
    }

    // ========== 进度条动画 ==========
    function animateProgressBars() {
        setTimeout(() => {
            document.querySelectorAll('.progress-fill[data-width]').forEach(bar => {
                bar.style.width = bar.getAttribute('data-width');
            });
        }, 300);
    }

    // ========== JSON 语法高亮 ==========
    function syntaxHighlight(json) {
        json = json.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
        return json.replace(
            /("(\u[a-zA-Z0-9]{4}|\[^u]|[^\"])*"(\s*:)?|(true|false|null)|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
            function(match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }
                return '<span class="' + cls + '">' + match + '</span>';
            }
        );
    }

    // ========== 启动 ==========
    loadData();

    // 每 60 秒自动刷新
    setInterval(loadData, 60000);
</script>
