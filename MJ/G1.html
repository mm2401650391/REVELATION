    <script>
    document.getElementById('searchInput').addEventListener('input', function() {
        let filter = this.value.toUpperCase().trim();
        let table = document.getElementById("dataList");
        let rows = table.querySelectorAll('tbody tr');  // 查所有 tbody 里的 tr
        let hasVisible = false;
    
        for (let i = 0; i < rows.length; i++) {
            if (rows[i].classList.contains('empty-row')) continue;
    
            let txtValue = rows[i].textContent || rows[i].innerText;
            if (txtValue.toUpperCase().indexOf(filter) > -1) {
                rows[i].style.display = "";
                hasVisible = true;
            } else {
                rows[i].style.display = "none";
            }
        }
    
        // 处理"未找到"提示行（放到第一个 tbody 里）
        let firstTbody = table.querySelector('tbody');
        let emptyRow = firstTbody.querySelector('.empty-row');
        if (!hasVisible && filter !== '') {
            if (!emptyRow) {
                emptyRow = document.createElement('tr');
                emptyRow.className = 'empty-row';
                emptyRow.innerHTML = '<td colspan="4">未找到匹配的成员</td>';
                firstTbody.appendChild(emptyRow);
            } else {
                emptyRow.style.display = '';
            }
        } else if (emptyRow) {
            emptyRow.style.display = 'none';
        }
    });
    </script>
