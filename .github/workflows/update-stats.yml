name: Update GA4 Stats

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch GA4 cumulative data
        run: |
          curl -sL "https://script.google.com/macros/s/AKfycbzkV0jDmz0uP4n0kb8XnXJEJ5giJFQZyfIJH6kl-_BAXwF0hTOfautNBStXbtujCpEn8Q/exec?start=2026-05-18&end=today" > stats.json

      - name: Validate data
        run: |
          if ! jq -e '.success' stats.json > /dev/null; then
            echo "GA4 API failed"
            cat stats.json
            exit 1
          fi

      - name: Check if data changed
        id: check
        run: |
          if git diff --quiet stats.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push if changed
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stats.json
          git commit -m "Update stats: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
