        #starfield {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 背景装饰层 - Warframe 壁纸 */
        .bg-wallpaper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background: 
                linear-gradient(180deg, rgba(10,10,18,0.95) 0%, rgba(10,10,18,0.85) 50%, rgba(10,10,18,0.98) 100%),
                url('IMGs/index1.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            pointer-events: none;
        }
        
        /* ========== 轨道线装饰 ========== */
        .orbit-line {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            opacity: 0.15;
        }
        .orbit-top {
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00d4ff, #ffaa00, #00d4ff, transparent);
            animation: orbitPulse 3s ease-in-out infinite;
        }
        .orbit-bottom {
            bottom: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffaa00, #00d4ff, #ffaa00, transparent);
            animation: orbitPulse 3s ease-in-out infinite reverse;
        }
        .orbit-left {
            top: 0;
            left: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #00d4ff, #ffaa00, #00d4ff, transparent);
            animation: orbitPulseVertical 4s ease-in-out infinite;
        }
        .orbit-right {
            top: 0;
            right: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, transparent, #ffaa00, #00d4ff, #ffaa00, transparent);
            animation: orbitPulseVertical 4s ease-in-out infinite reverse;
        }

        @keyframes orbitPulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.3; }
        }
        @keyframes orbitPulseVertical {
            0%, 100% { opacity: 0.08; }
            50% { opacity: 0.25; }
        }

        /* ========== 六边形网格装饰 ========== */
        .hex-grid {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            width: 200px;
            height: 200px;
            opacity: 0.08;
            background-image: 
                linear-gradient(30deg, #00d4ff 12%, transparent 12.5%, transparent 87%, #00d4ff 87.5%, #00d4ff),
                linear-gradient(150deg, #00d4ff 12%, transparent 12.5%, transparent 87%, #00d4ff 87.5%, #00d4ff),
                linear-gradient(30deg, #00d4ff 12%, transparent 12.5%, transparent 87%, #00d4ff 87.5%, #00d4ff),
                linear-gradient(150deg, #00d4ff 12%, transparent 12.5%, transparent 87%, #00d4ff 87.5%, #00d4ff),
                linear-gradient(60deg, rgba(0,212,255,0.1) 25%, transparent 25.5%, transparent 75%, rgba(0,212,255,0.1) 75%, rgba(0,212,255,0.1)),
                linear-gradient(60deg, rgba(0,212,255,0.1) 25%, transparent 25.5%, transparent 75%, rgba(0,212,255,0.1) 75%, rgba(0,212,255,0.1));
            background-size: 40px 70px;
            background-position: 0 0, 0 0, 20px 35px, 20px 35px, 0 0, 20px 35px;
            animation: hexFloat 6s ease-in-out infinite;
        }
        .hex-tl { top: 20px; left: 20px; }
        .hex-tr { top: 20px; right: 20px; transform: scaleX(-1); }
        .hex-bl { bottom: 20px; left: 20px; transform: scaleY(-1); }
        .hex-br { bottom: 20px; right: 20px; transform: scale(-1); }

        @keyframes hexFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.06; }
            50% { transform: translateY(-10px) rotate(2deg); opacity: 0.12; }
        }
        .hex-tr { animation: hexFloat 6s ease-in-out infinite reverse; }
        .hex-bl { animation: hexFloat 7s ease-in-out infinite; }
        .hex-br { animation: hexFloat 7s ease-in-out infinite reverse; }

        /* ========== 数据流文字 ========== */
        .data-stream {
            position: fixed;
            top: 0;
            right: 0;
            width: 120px;
            height: 100%;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
            opacity: 0.06;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #00d4ff;
            line-height: 1.4;
            writing-mode: vertical-rl;
            text-orientation: mixed;
            padding: 10px;

        /* ========== 扫描线效果 ========== */
        .scan-line {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, transparent, rgba(0,212,255,0.3), transparent);
            z-index: 9999;
            pointer-events: none;
            animation: scanMove 4s linear infinite;
            box-shadow: 0 0 20px rgba(0,212,255,0.2);
        }

        @keyframes scanMove {
            0% { top: -4px; }
            100% { top: 100vh; }
        }

        /* ========== 角标装饰 ========== */
        .corner-deco {
            position: fixed;
            z-index: 0;
            pointer-events: none;
            width: 60px;
            height: 60px;
            opacity: 0.2;
        }
        .corner-deco::before,
        .corner-deco::after {
            content: '';
            position: absolute;
            background: #00d4ff;
        }
        .corner-deco::before {
            width: 30px;
            height: 2px;
        }
        .corner-deco::after {
            width: 2px;
            height: 30px;
        }
        .corner-tl { top: 15px; left: 15px; }
        .corner-tl::before { top: 0; left: 0; }
        .corner-tl::after { top: 0; left: 0; }
        .corner-tr { top: 15px; right: 15px; }
        .corner-tr::before { top: 0; right: 0; }
        .corner-tr::after { top: 0; right: 0; }
        .corner-bl { bottom: 15px; left: 15px; }
        .corner-bl::before { bottom: 0; left: 0; }
        .corner-bl::after { bottom: 0; left: 0; }
        .corner-br { bottom: 15px; right: 15px; }
        .corner-br::before { bottom: 0; right: 0; }
        .corner-br::after { bottom: 0; right: 0; }

        /* 角标发光 */
        .corner-deco {
            filter: drop-shadow(0 0 5px rgba(0,212,255,0.5));
            animation: cornerGlow 3s ease-in-out infinite;
        }
        @keyframes cornerGlow {
            0%, 100% { opacity: 0.15; }
            50% { opacity: 0.3; }
        }


        /* 内容层 
        body > *:not(.bg-wallpaper):not(#starfield) {
            position: relative;
            z-index: 1;

    <!-- ========== 打字机效果 ========== -->
    <script>
        const texts = ["REVELATION", "天启 联盟"];
        const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#96ceb4", "#feca57", "#ff9ff3", "#54a0ff", "#00d4ff"];
        let index = 0;
        let isTyping = true;
        let cursor = 0;
        const shadows = [
            "2px 2px 4px rgba(255, 0, 0, 0.4)",
            "2px 2px 8px rgba(78, 205, 196, 0.5)",
            "0 0 10px rgba(69, 183, 209, 0.6)",
            "3px 3px 0px rgba(0, 0, 0, 0.8)",
            "-2px -2px 4px rgba(254, 202, 87, 0.4)",
            "0 4px 6px rgba(255, 159, 243, 0.5)",
            "1px 1px 2px rgba(0, 0, 0, 0.5), 0 0 15px rgba(84, 160, 255, 0.6)",
            "0 0 20px rgba(0, 212, 255, 0.6), 0 0 40px rgba(0, 212, 255, 0.3)"
        ];

        function typeEffect() {
            const textElement = document.getElementById("typing");
            const currentText = texts[index];

            if (cursor === 0 && isTyping) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                textElement.style.color = randomColor;
                textElement.style.textShadow = shadows[Math.floor(Math.random() * shadows.length)];
            }

            if (isTyping) {
                if (cursor < currentText.length) {
                    textElement.textContent += currentText.charAt(cursor);
                    cursor++;
                } else {
                    cursor = 0;
                    isTyping = false;
                    setTimeout(typeEffect, 1500);
                    return;
                }
            } else {
                if (textElement.textContent.length > 0) {
                    textElement.textContent = textElement.textContent.slice(0, -1);
                } else {
                    isTyping = true;
                    index = (index + 1) % texts.length;
                    typeEffect();
                    return;
                }
            }
            setTimeout(typeEffect, isTyping ? 100 : 100);
        }

        typeEffect();
    </script>

    <!-- ========== 星空粒子动画 ========== -->
    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        const numStars = 300;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function initStars() {
            stars = [];
            for (let i = 0; i < numStars; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    radius: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 0.3 + 0.1,
                    opacity: Math.random() * 0.8 + 0.2,
                    twinkle: Math.random() * 0.02 + 0.005
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            stars.forEach(star => {
                star.opacity += star.twinkle;
                if (star.opacity > 1 || star.opacity < 0.2) {
                    star.twinkle = -star.twinkle;
                }

                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }

                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(200, 220, 255, ${star.opacity})`;
                ctx.fill();
            });

            requestAnimationFrame(drawStars);
        }

        resizeCanvas();
        initStars();
        drawStars();

        window.addEventListener('resize', () => {
            resizeCanvas();
            initStars();
        });
    </script>

    <!-- ========== Warframe API 周期数据 ========== -->
    <script>
        const API_BASE = 'https://www.rln1.xyz/api/warframe?endpoint=';
        let countdownInterval = null;

        function getTime(data) {
            if (!data) return '?';
            if (data.timeLeft) return data.timeLeft;
            if (data.eta) return data.eta;
            if (data.etaString) return data.etaString;

            if (data.expiry) {
                const now = Date.now();
                const expiry = Date.parse(data.expiry);
                const diff = expiry - now;

                if (diff > 0) {
                    const hours = Math.floor(diff / 3600000);
                    const mins = Math.floor((diff % 3600000) / 60000);
                    const secs = Math.floor((diff % 60000) / 1000);

                    if (hours > 0) return hours + 'h ' + mins + 'm ' + secs + 's';
                    if (mins > 0) return mins + 'm ' + secs + 's';
                    return secs + 's';
                }
                return 'expired';
            }
            return '?';
        }

        function startCountdown() {
            if (countdownInterval) clearInterval(countdownInterval);

            countdownInterval = setInterval(() => {
                const elements = document.querySelectorAll('[data-expiry]');
                let hasExpired = false;

                elements.forEach(el => {
                    const expiry = el.getAttribute('data-expiry');
                    if (!expiry) return;

                    const now = Date.now();
                    const expiryTime = Date.parse(expiry);
                    const diff = expiryTime - now;

                    if (diff > 0) {
                        const hours = Math.floor(diff / 3600000);
                        const mins = Math.floor((diff % 3600000) / 60000);
                        const secs = Math.floor((diff % 60000) / 1000);

                        let text;
                        if (hours > 0) text = hours + 'h ' + mins + 'm ' + secs + 's';
                        else if (mins > 0) text = mins + 'm ' + secs + 's';
                        else text = secs + 's';

                        el.textContent = '剩余: ' + text;

                        if (diff < 60000) {
                            el.classList.add('expiring');
                        } else {
                            el.classList.remove('expiring');
                        }
                        el.classList.remove('expired');
                    } else {
                        el.textContent = '剩余: 状态轮换中...';
                        el.classList.add('expired');
                        el.classList.remove('expiring');
                        hasExpired = true;
                    }
                });

                if (hasExpired) {
                    console.log('检测到状态过期，自动刷新...');
                    loadData();
                }
            }, 1000);
        }

        async function loadData() {
            try {
                const [earth, cetus, vallis, cambion, zariman] = await Promise.all([
                    fetch(API_BASE + 'earthCycle').then(r => r.json()),
                    fetch(API_BASE + 'cetusCycle').then(r => r.json()),
                    fetch(API_BASE + 'vallisCycle').then(r => r.json()),
                    fetch(API_BASE + 'cambionCycle').then(r => r.json()),
                    fetch(API_BASE + 'zarimanCycle').then(r => r.json()),
                ]);

                const cycles = [
                    { name: '🌍 地球', data: earth, stateKey: 'isDay', dayText: '白天', nightText: '黑夜' },
                    { name: '🌙 希图斯', data: cetus, stateKey: 'isDay', dayText: '白天', nightText: '黑夜' },
                    { name: '❄️ 福尔图娜', data: vallis, stateKey: 'isWarm', dayText: '温暖', nightText: '寒冷' },
                    { name: '🦠 火卫二', data: cambion, stateKey: 'active', dayText: 'Fass', nightText: 'Vome' },
                    { name: '🌌 扎里曼', data: zariman, stateKey: 'isCorpus', dayText: 'Corpus占领', nightText: 'Grineer占领' }
                ];

                let html = '';
                cycles.forEach(c => {
                    if (!c.data) return;
                    let state, color;

                    if (c.name === '🦠 火卫二') {
                        state = c.data.state || 'Fass';
                        color = state === 'fass' ? '#ff4444' : '#4488ff';
                    } else if (c.name === '🌌 扎里曼') {
                        state = c.data.state || 'Unknown';
                        color = state.toLowerCase().includes('corpus') ? '#4488ff' : '#ff4444';
                    } else {
                        const isDay = c.data[c.stateKey];
                        state = isDay ? c.dayText : c.nightText;
                        color = isDay ? '#ffaa00' : '#4488ff';
                    }

                    const timeStr = getTime(c.data);
                    const isExpired = timeStr === 'expired';
                    const displayTime = isExpired ? '状态轮换中...' : timeStr;

                    html += `
                        <div class="wf-item" style="border-left-color: ${color};">
                            <div class="wf-item-header">
                                <span class="wf-item-name">${c.name}</span>
                                <span class="wf-item-time" style="color:${color}; background: ${color}22;">${state}</span>
                            </div>
                            <div class="item-info ${isExpired ? 'expired' : ''}" data-expiry="${c.data.expiry || ''}">
                                剩余: ${displayTime}
                            </div>
                        </div>
                    `;
                });

                document.getElementById('app').innerHTML = '<div class="wf-card"><div class="wf-card-title">星球周期</div>' + html + '</div>';
                document.getElementById('updateTime').textContent = '更新: ' + new Date().toLocaleString('zh-CN');

                startCountdown();
            } catch (err) {
                document.getElementById('app').innerHTML = '<div class="wf-error">❌ ' + err.message + '</div>';
            }
        }

        loadData();
        setInterval(loadData, 120000);
    </script>

                }

            }

        }

        generateStream();
        setInterval(generateStream, 2000);
    </script>
