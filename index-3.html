    <script>
        // ========== 打字机效果 ==========
        const texts = ["REVELATION", "天启 联盟"];
        const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#96ceb4", "#feca57", "#ff9ff3", "#54a0ff"];
        const shadows = [
            "2px 2px 4px rgba(255, 0, 0, 0.4)",
            "2px 2px 8px rgba(78, 205, 196, 0.5)",
            "0 0 10px rgba(69, 183, 209, 0.6)",
            "3px 3px 0px rgba(0, 0, 0, 0.8)",
            "-2px -2px 4px rgba(254, 202, 87, 0.4)",
            "0 4px 6px rgba(255, 159, 243, 0.5)",
            "1px 1px 2px rgba(0, 0, 0, 0.5), 0 0 15px rgba(84, 160, 255, 0.6)"
        ];
        let index = 0, isTyping = true, cursor = 0;

        function typeEffect() {
            const textElement = document.getElementById("typing");
            const currentText = texts[index];
            if (cursor === 0 && isTyping) {
                const randomColor = colors[Math.floor(Math.random() * colors.length)];
                textElement.style.color = randomColor;
                textElement.style.textShadow = shadows[Math.floor(Math.random() * shadows.length)];
            }
            if (isTyping) {
                if (cursor < currentText.length) {
                    textElement.textContent += currentText.charAt(cursor);
                    cursor++;
                } else {
                    cursor = 0; isTyping = false;
                    setTimeout(typeEffect, 1500); return;
                }
            } else {
                if (textElement.textContent.length > 0) {
                    textElement.textContent = textElement.textContent.slice(0, -1);
                } else {
                    isTyping = true;
                    index = (index + 1) % texts.length;
                    typeEffect(); return;
                }
            }
            setTimeout(typeEffect, isTyping ? 100 : 100);
        }
        typeEffect();

        // ========== 文字波浪动画 ==========
        function initHeaderBlink() {
            const headerText = document.getElementById('headerText');
            const text = headerText.textContent;
            headerText.innerHTML = '';
            const spans = [];
            for (let i = 0; i < text.length; i++) {
                const span = document.createElement('span');
                span.textContent = text[i];
                headerText.appendChild(span);
                spans.push(span);
            }
            const waveLength = 3;
            let position = -waveLength;
            let phase = 0;

            function animate() {
                if (phase === 0) {
                    for (let i = 0; i < spans.length; i++) spans[i].classList.remove('active');
                    for (let i = 0; i < waveLength; i++) {
                        let idx = position + i;
                        if (idx >= 0 && idx < spans.length) spans[idx].classList.add('active');
                    }
                    position++;
                    if (position > spans.length) { phase = 1; setTimeout(animate, 100); return; }
                    setTimeout(animate, 150);
                } else if (phase === 1) {
                    phase = 2; position = spans.length - 1; animate();
                } else if (phase === 2) {
                    if (position >= 0) {
                        spans[position].classList.remove('active');
                        position--;
                        setTimeout(animate, 120);
                    } else {
                        phase = 0; position = -waveLength;
                        setTimeout(animate, 100);
                    }
                }
            }
            animate();
        }
        initHeaderBlink();

        // ========== 物理球系统（图片球体） ==========
        (function() {
            const ball = document.getElementById('physicsBall');
            const ballSize = 150;
            const gravity = 0.6;
            const friction = 0.985;
            const bounce = 0.65;
            const stopThreshold = 0.3;
            const rotationSpeedFactor = 1.5;
        
            let x = window.innerWidth / 2 - ballSize / 2;
            let y = -ballSize;
            let vx = 0;
            let vy = 0;
            let rotation = 0;
            let isDragging = false;
            let dragOffsetX = 0;
            let dragOffsetY = 0;
            let lastMouseX = 0;
            let lastMouseY = 0;
            let lastTime = performance.now();
            let animId = null;
        
            // 以屏幕（视口）为边界
            function getBounds() {
                return {
                    w: window.innerWidth,
                    h: window.innerHeight
                };
            }
        
            function update() {
                if (isDragging) {
                    animId = requestAnimationFrame(update);
                    return;
                }
        
                const bounds = getBounds();
                const now = performance.now();
                const dt = Math.min((now - lastTime) / 16.67, 3);
                lastTime = now;
        
                vy += gravity * dt;
                vx *= Math.pow(friction, dt);
                vy *= Math.pow(friction, dt);
        
                x += vx * dt;
                y += vy * dt;
        
                // 左右边界
                if (x <= 0) {
                    x = 0;
                    vx = Math.abs(vx) * bounce;
                } else if (x + ballSize >= bounds.w) {
                    x = bounds.w - ballSize;
                    vx = -Math.abs(vx) * bounce;
                }
        
                // 上下边界（以屏幕为界）
                if (y <= 0) {
                    y = 0;
                    vy = Math.abs(vy) * bounce;
                } else if (y + ballSize >= bounds.h) {
                    y = bounds.h - ballSize;
                    vy = -Math.abs(vy) * bounce;
                    if (Math.abs(vy) < stopThreshold * 3) vy = 0;
                }
        
                const speed = Math.sqrt(vx * vx + vy * vy);
                if (speed > stopThreshold) {
                    rotation += vx * rotationSpeedFactor * dt;
                }
        
                ball.style.left = x + 'px';
                ball.style.top = y + 'px';
                ball.style.transform = 'rotate(' + rotation + 'deg)';
        
                // 静止判断
                if (speed < stopThreshold && !isDragging && Math.abs(vy) < stopThreshold && y + ballSize >= bounds.h - 3) {
                    vx = 0; vy = 0;
                    ball.style.transform = 'rotate(' + rotation + 'deg)';
                    animId = null;
                    return;
                }
        
                animId = requestAnimationFrame(update);
            }
        
            function startPhysics() {
                if (!animId) {
                    lastTime = performance.now();
                    animId = requestAnimationFrame(update);
                }
            }
        
            function onDown(e) {
                e.preventDefault();
                isDragging = true;
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                dragOffsetX = clientX - x;
                dragOffsetY = clientY - y;
                lastMouseX = clientX;
                lastMouseY = clientY;
                vx = 0; vy = 0;
            }
        
            function onMove(e) {
                if (!isDragging) return;
                e.preventDefault();
                const clientX = e.touches ? e.touches[0].clientX : e.clientX;
                const clientY = e.touches ? e.touches[0].clientY : e.clientY;
                const bounds = getBounds();
                x = Math.max(0, Math.min(bounds.w - ballSize, clientX - dragOffsetX));
                y = Math.max(0, Math.min(bounds.h - ballSize, clientY - dragOffsetY));
                vx = (clientX - lastMouseX) * 0.6;
                vy = (clientY - lastMouseY) * 0.6;
                lastMouseX = clientX;
                lastMouseY = clientY;
                ball.style.left = x + 'px';
                ball.style.top = y + 'px';
            }
        
            function onUp(e) {
                if (!isDragging) return;
                isDragging = false;
                startPhysics();
            }
        
            ball.addEventListener('mousedown', onDown);
            ball.addEventListener('touchstart', onDown, { passive: false });
            window.addEventListener('mousemove', onMove);
            window.addEventListener('touchmove', onMove, { passive: false });
            window.addEventListener('mouseup', onUp);
            window.addEventListener('touchend', onUp);
        
            window.addEventListener('resize', () => {
                const bounds = getBounds();
                x = Math.min(x, bounds.w - ballSize);
                y = Math.min(y, bounds.h - ballSize);
            });
        
            // 初始化
            ball.style.left = x + 'px';
            ball.style.top = y + 'px';
            ball.style.transform = 'rotate(0deg)';
            startPhysics();
        })();
    </script>
